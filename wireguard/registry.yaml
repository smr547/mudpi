hub:
  name: mudpi
  endpoint: mudpi.southsky.com.au:51820
  vpn_subnet: 10.8.1.0/24
  vpn_address: 10.8.1.1
  listen_port: 51820
  routes:
    - 10.1.1.0/24
  description: Reid hub and site gateway
  key_ref: hub/mudpi

zones:
  reid:
    subnet: 10.1.1.0/24
    via: mudpi
    description: Reid home infrastructure

  farm:
    subnet: 192.168.0.0/24
    via: shedpi
    description: Barking Owl farm infrastructure

peers:
  - name: shedpi
    peer_type: site
    vpn_address: 10.8.1.20
    routes:
      - 192.168.0.0/24
    description: Farm site gateway
    key_ref: peers/shedpi
    key_status: existing
    endpoint:
      hostname: shedpi.farm.home.arpa
      port: 51820

  - name: sten-laptop
    peer_type: human
    vpn_address: 10.8.1.101
    access:
      - reid
      - farm
    description: Sten laptop
    key_ref: peers/sten-laptop
    key_status: existing
    enrollment_status: complete

  - name: sten-phone
    peer_type: human
    vpn_address: 10.8.1.102
    access:
      - reid
      - farm
    description: Sten phone
    key_ref: peers/sten-phone
    key_status: existing
    enrollment_status: complete

  - name: james-laptop
    peer_type: human
    vpn_address: 10.8.1.110
    access:
      - reid
      - farm
    description: James laptop
    key_ref: peers/james-laptop
    key_status: to-be-generated
    enrollment_status: pending
    notes:
      - First test of documented human-peer enrolment procedure
